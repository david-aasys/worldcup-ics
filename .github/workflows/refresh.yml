name: Refresh World Cup ICS

on:
  schedule:
    # Live match windows (UTC) — every 5 min
    - cron: '*/5 15-20 * 6-7 *'
    - cron: '*/5 21-23 * 6-7 *'
    - cron: '*/5 0-2 * 6-7 *'
    # Active tournament days (UTC) — every 30 min outside match windows
    - cron: '*/30 3-14 * 6-7 *'
    # Off-peak — every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests icalendar pytz

      - name: Check API key is set
        run: |
          if [ -z "$FOOTBALL_DATA_KEY" ]; then
            echo "ERROR: FOOTBALL_DATA_KEY secret is empty or not set"
            exit 1
          else
            echo "API key is set (length: ${#FOOTBALL_DATA_KEY})"
          fi
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}

      - name: Test API connectivity
        run: |
          echo "Testing API-Football endpoint..."
          curl -s -o /tmp/api_test.json -w "HTTP %{http_code}" \
            -H "x-apisports-key: $FOOTBALL_DATA_KEY" \
            "https://v3.football.api-sports.io/status"
          echo ""
          cat /tmp/api_test.json
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}

      - name: Run generate_ics.py
        run: python generate_ics.py 2>&1
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}

      - name: Commit and push if changed
        run: |
          git config user.name "worldcup-bot"
          git config user.email "bot@worldcup2026.local"
          git add docs/worldcup.ics
          git diff --cached --quiet || git commit -m "Refresh ICS [$(date -u +%H:%M UTC)]"
          git push
